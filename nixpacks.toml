[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "ffmpeg", "chromium", "nss", "nspr", "atk", "cups", "gtk3", "alsa-lib"]

[phases.install]
cmds = [
  "python3 -m pip install -r requirements.txt",
  "python3 -m playwright install chromium"
]

[start]
cmd = "python3 -m streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false"
